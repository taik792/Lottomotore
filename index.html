<!-- index.html COMPLETO — LOTTO ELITE PRO MOTORE 5 -->

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotto Elite Pro - Motore 5</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #001427;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      color: #00ffd5;
      font-size: 34px;
      margin-bottom: 10px;
    }

    h2 {
      margin-top: 40px;
      font-size: 28px;
      color: white;
    }

    .subtitle {
      font-size: 18px;
      color: #00ffd5;
      margin-bottom: 30px;
    }

    .grid-top {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 18px;
      margin-bottom: 30px;
    }

    .grid-ruote {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 18px;
      margin-top: 20px;
    }

    .box-top {
      background: #2b2100;
      border: 3px solid #ffd700;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 0 12px rgba(255,215,0,0.25);
    }

    .box-jolly {
      background: #4d0000;
      border: 3px solid red;
      border-radius: 18px;
      padding: 24px;
      margin: 20px auto;
      max-width: 700px;
      box-shadow: 0 0 15px rgba(255,0,0,0.25);
    }

    .box-ruota {
      background: #06233a;
      border: 3px solid #00ffd5;
      border-radius: 18px;
      padding: 20px;
    }

    .ruota {
      font-size: 20px;
      font-weight: bold;
      color: #d0d0d0;
      margin-bottom: 12px;
    }

    .numeri {
      font-size: 26px;
      font-weight: bold;
      color: #00ffd5;
      margin-bottom: 10px;
    }

    .score {
      font-size: 15px;
      color: #ff6b6b;
    }

    .section-title {
      font-size: 22px;
      font-weight: bold;
      margin: 30px 0 20px;
    }

    .loading {
      margin-top: 80px;
      font-size: 22px;
      color: #00ffd5;
    }
  </style>
</head>
<body>

  <h1>🔥 LOTTO ELITE PRO</h1>
  <div class="subtitle">motore 5 chirurgico</div>

  <div id="app">
    <div class="loading">Caricamento previsioni...</div>
  </div>

  <script>
    async function caricaPrevisioni() {
      try {
        const response = await fetch("previsioni.json?v=" + new Date().getTime());
        const data = await response.json();

        let html = "";

        /* TOP */

        html += `
          <h2>🎯 TOP</h2>
          <div class="grid-top">
        `;

        data.top.forEach(item => {
          html += `
            <div class="box-top">
              <div class="ruota">${item.ruota}</div>
              <div class="numeri">
                ${item.numeri[0]} – ${item.numeri[1]}
              </div>
            </div>
          `;
        });

        html += `</div>`;

        /* JOLLY */

        if (data.jolly) {
          html += `
            <h2>💣 JOLLY</h2>

            <div class="box-jolly">
              <div class="ruota">
                ${data.jolly.label}
              </div>

              <div class="numeri">
                ${data.jolly.numeri[0]} – ${data.jolly.numeri[1]}
              </div>
            </div>
          `;
        }

        /* RUOTE COMPLETE */

        html += `
          <h2>📊 RUOTE ambo forte</h2>
          <div class="grid-ruote">
        `;

        Object.entries(data.ruote).forEach(([ruota, dati]) => {
          html += `
            <div class="box-ruota">
              <div class="ruota">${ruota}</div>

              <div class="numeri">
                ${dati.numeri[0]} – ${dati.numeri[1]}
              </div>

              <div class="score">
                Score: ${dati.score}
              </div>
            </div>
          `;
        });

        html += `</div>`;

        document.getElementById("app").innerHTML = html;

      } catch (error) {
        document.getElementById("app").innerHTML = `
          <div class="loading">
            Errore caricamento previsioni.json
          </div>
        `;
        console.error(error);
      }
    }

    caricaPrevisioni();
  </script>

</body>
</html>
