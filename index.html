<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOTTO ELITE PRO</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: #001b2e;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
}

.container {
    max-width: 1400px;
    margin: auto;
    padding: 20px;
}

h1 {
    color: #00ffe0;
    font-size: 52px;
    margin-bottom: 10px;
    letter-spacing: 2px;
}

h2 {
    color: #00ffe0;
    font-size: 28px;
    margin-bottom: 40px;
}

.section-title {
    font-size: 34px;
    margin: 40px 0 25px;
    font-weight: bold;
}

.grid-top {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    margin-bottom: 40px;
}

.grid-ruote {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
}

.card-top {
    background: #2d2200;
    border: 4px solid #ffd700;
    border-radius: 24px;
    padding: 28px 16px;
    box-shadow: 0 0 20px rgba(255,215,0,0.25);
}

.card-jolly {
    background: #5a0000;
    border: 4px solid red;
    border-radius: 24px;
    padding: 35px 20px;
    margin-bottom: 40px;
    box-shadow: 0 0 20px rgba(255,0,0,0.25);
}

.card-ruota {
    background: #062b45;
    border: 3px solid #00ffe0;
    border-radius: 24px;
    padding: 22px 14px;
}

.ruota {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 12px;
}

.label {
    font-size: 16px;
    color: #dddddd;
    margin-top: 10px;
    margin-bottom: 8px;
}

.estrazione {
    font-size: 18px;
    line-height: 1.6;
    color: #ffffff;
    margin-bottom: 14px;
}

.numeri {
    font-size: 34px;
    font-weight: bold;
    color: #00ffe0;
    margin: 12px 0;
}

.score {
    color: #ff8f8f;
    font-size: 18px;
    font-weight: bold;
}

.errore {
    font-size: 42px;
    margin-top: 80px;
    color: white;
}

@media (max-width: 900px) {
    .grid-top,
    .grid-ruote {
        grid-template-columns: repeat(2, 1fr);
    }

    h1 {
        font-size: 42px;
    }
}

@media (max-width: 600px) {
    .grid-top,
    .grid-ruote {
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
    }

    h1 {
        font-size: 28px;
    }

    h2 {
        font-size: 20px;
    }

    .section-title {
        font-size: 24px;
    }

    .card-top,
    .card-ruota {
        padding: 14px 8px;
        border-radius: 18px;
    }

    .ruota {
        font-size: 18px;
    }

    .numeri {
        font-size: 22px;
    }

    .estrazione {
        font-size: 14px;
    }

    .score {
        font-size: 14px;
    }
}
</style>
</head>
<body>

<div class="container">
    <h1>🔥 LOTTO ELITE PRO motore5</h1>
    <h2>motore definitivo PRO</h2>

    <div id="contenuto">
        <div class="errore">Caricamento...</div>
    </div>
</div>

<script>
function formatNumeri(arr) {
    return arr.join(" — ");
}

function formatEstrazione(arr) {
    return arr.join(" • ");
}

async function caricaDati() {
    try {
        const risultatiResponse = await fetch(
            "risultati.json?v=" + new Date().getTime()
        );
        const estrazioniResponse = await fetch(
            "estrazioni.json?v=" + new Date().getTime()
        );

        const risultati = await risultatiResponse.json();
        const estrazioni = await estrazioniResponse.json();

        let html = "";

        // TOP
        html += `
            <div class="section-title">🎯 TOP</div>
            <div class="grid-top">
        `;

        risultati.top.forEach(item => {
            html += `
                <div class="card-top">
                    <div class="ruota">${item.ruota}</div>
                    <div class="numeri">${formatNumeri(item.numeri)}</div>
                </div>
            `;
        });

        html += `</div>`;

        // JOLLY
        html += `
            <div class="section-title">💣 JOLLY</div>
            <div class="card-jolly">
                <div class="ruota">${risultati.jolly.ruota}</div>
                <div class="numeri">${formatNumeri(risultati.jolly.numeri)}</div>
            </div>
        `;

        // RUOTE
        html += `
            <div class="section-title">📊 RUOTE AMBO FORTE</div>
            <div class="grid-ruote">
        `;

        risultati.ruote.forEach(item => {
            const storicoRuota = estrazioni[item.ruota] || [];
            const ultima = storicoRuota[storicoRuota.length - 1] || [];

            html += `
                <div class="card-ruota">
                    <div class="ruota">${item.ruota}</div>

                    <div class="label">Ultima Estrazione</div>
                    <div class="estrazione">
                        ${formatEstrazione(ultima)}
                    </div>

                    <div class="label">Ambo Forte</div>
                    <div class="numeri">
                        ${formatNumeri(item.numeri)}
                    </div>

                    <div class="score">
                        Score: ${item.score}
                    </div>
                </div>
            `;
        });

        html += `</div>`;

        document.getElementById("contenuto").innerHTML = html;

    } catch (e) {
        document.getElementById("contenuto").innerHTML = `
            <div class="errore">
                Errore caricamento risultati.json
            </div>
        `;
        console.error(e);
    }
}

caricaDati();
</script>

</body>
</html>
