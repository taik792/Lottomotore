<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOTTO ELITE PRO</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: #001b2e;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
}

.container {
    width: 95%;
    margin: auto;
    padding: 20px 0;
}

h1 {
    color: #00ffe7;
    font-size: 52px;
    margin-bottom: 10px;
}

h2 {
    color: #00ffe7;
    font-size: 26px;
    margin-bottom: 40px;
}

.section-title {
    font-size: 42px;
    margin: 35px 0 20px;
    font-weight: bold;
}

.top-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    margin-bottom: 30px;
}

.top-box {
    background: #3a2a00;
    border: 3px solid gold;
    border-radius: 20px;
    padding: 18px 10px;
    box-shadow: 0 0 15px rgba(255,215,0,0.3);
}

.top-box h3 {
    margin: 0 0 10px;
    font-size: 24px;
}

.top-numbers {
    font-size: 34px;
    color: #00ffe7;
    font-weight: bold;
    line-height: 1.3;
}

.jolly-box {
    background: #7a0000;
    border: 4px solid red;
    border-radius: 22px;
    padding: 22px 10px;
    margin-bottom: 40px;
    box-shadow: 0 0 20px rgba(255,0,0,0.25);
}

.jolly-box h3 {
    margin: 0 0 10px;
    font-size: 26px;
}

.jolly-numbers {
    font-size: 42px;
    color: #00ffe7;
    font-weight: bold;
}

.ruote-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
}

.ruota-box {
    background: #062b45;
    border: 3px solid #00ffe7;
    border-radius: 22px;
    padding: 20px 14px;
}

.ruota-box h3 {
    margin: 0 0 15px;
    font-size: 24px;
}

.label {
    font-size: 18px;
    color: #cccccc;
    margin-top: 10px;
    margin-bottom: 8px;
    font-weight: bold;
}

.estrazione {
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 14px;
}

.ambo {
    font-size: 28px;
    color: #00ffe7;
    font-weight: bold;
    margin: 10px 0;
}

.score {
    color: #ff8f8f;
    font-size: 18px;
    font-weight: bold;
}

@media (max-width: 900px) {
    h1 {
        font-size: 34px;
    }

    h2 {
        font-size: 20px;
    }

    .section-title {
        font-size: 28px;
    }

    .top-grid,
    .ruote-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
    }

    .top-box,
    .ruota-box {
        padding: 14px 8px;
    }

    .top-box h3,
    .ruota-box h3 {
        font-size: 18px;
    }

    .top-numbers,
    .ambo {
        font-size: 20px;
    }

    .jolly-box {
        padding: 18px 8px;
    }

    .jolly-box h3 {
        font-size: 20px;
    }

    .jolly-numbers {
        font-size: 28px;
    }

    .label {
        font-size: 14px;
    }

    .estrazione {
        font-size: 14px;
    }

    .score {
        font-size: 15px;
    }
}
</style>
</head>
<body>

<div class="container">

    <h1>🔥 LOTTO ELITE PRO motore5</h1>
    <h2>motore definitivo PRO</h2>

    <div id="app"></div>

</div>

<script>
fetch("risultati.json")
.then(response => response.json())
.then(data => {

    const app = document.getElementById("app");

    let html = "";

    // TOP
    html += `<div class="section-title">🎯 TOP</div>`;
    html += `<div class="top-grid">`;

    data.top.slice(0, 3).forEach(item => {
        html += `
            <div class="top-box">
                <h3>${item.ruota}</h3>
                <div class="top-numbers">
                    ${item.numeri[0]} — ${item.numeri[1]}
                </div>
            </div>
        `;
    });

    html += `</div>`;

    // JOLLY
    if (data.top.length > 0) {
        const jolly = data.top[0];

        html += `
            <div class="section-title">💣 JOLLY</div>
            <div class="jolly-box">
                <h3>${jolly.ruota}</h3>
                <div class="jolly-numbers">
                    ${jolly.numeri[0]} — ${jolly.numeri[1]}
                </div>
            </div>
        `;
    }

    // RUOTE
    html += `<div class="section-title">📊 RUOTE AMBO FORTE</div>`;
    html += `<div class="ruote-grid">`;

    data.top.forEach(item => {
        const estrazione = item.ultima_estrazione
            ? item.ultima_estrazione.join(" • ")
            : "—";

        html += `
            <div class="ruota-box">
                <h3>${item.ruota}</h3>

                <div class="label">Ultima Estrazione</div>
                <div class="estrazione">${estrazione}</div>

                <div class="label">Ambo Forte</div>
                <div class="ambo">
                    ${item.numeri[0]} — ${item.numeri[1]}
                </div>

                <div class="score">
                    Score: ${item.score}
                </div>
            </div>
        `;
    });

    html += `</div>`;

    app.innerHTML = html;
})
.catch(error => {
    document.getElementById("app").innerHTML =
        "<h2>Errore caricamento risultati.json</h2>";
    console.error(error);
});
</script>

</body>
</html>
