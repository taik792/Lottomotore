<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOTTO ELITE PRO</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #031b2f;
    color: white;
    font-family: Arial, sans-serif;
    padding: 20px;
}

.container {
    max-width: 1500px;
    margin: auto;
}

/* TITOLI */

h1 {
    text-align: center;
    color: #00ffe0;
    font-size: 52px;
    margin-bottom: 10px;
}

h2 {
    text-align: center;
    color: #00ffe0;
    font-size: 28px;
    margin-bottom: 40px;
}

.section-title {
    text-align: center;
    font-size: 38px;
    font-weight: bold;
    margin: 40px 0 25px;
}

/* TOP */

.top-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

.top-card {
    background: #2a2100;
    border: 3px solid #ffd700;
    border-radius: 24px;
    padding: 28px;
    text-align: center;
    box-shadow: 0 0 18px rgba(255,215,0,0.20);
}

.top-card h3 {
    font-size: 30px;
    margin-bottom: 12px;
}

.top-number {
    color: #00ffe0;
    font-size: 42px;
    font-weight: bold;
}

/* JOLLY */

.jolly-card {
    margin-top: 25px;
    background: #5c0000;
    border: 3px solid red;
    border-radius: 24px;
    padding: 35px;
    text-align: center;
    box-shadow: 0 0 20px rgba(255,0,0,0.20);
}

.jolly-card h3 {
    font-size: 34px;
    margin-bottom: 14px;
}

.jolly-number {
    color: #00ffe0;
    font-size: 48px;
    font-weight: bold;
}

/* RUOTE → 3 PER RIGA */

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    margin-top: 20px;
}

.card {
    background: #08243d;
    border: 2px solid #00ffe0;
    border-radius: 22px;
    padding: 22px;
    text-align: center;
    box-shadow: 0 0 14px rgba(0,255,224,0.15);
}

.card h3 {
    font-size: 28px;
    margin-bottom: 18px;
}

.ultima-title {
    color: #dcdcdc;
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 10px;
}

.ultima {
    color: white;
    font-size: 22px;
    margin-bottom: 20px;
    line-height: 1.5;
}

.ambo-title {
    color: #00ffe0;
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 10px;
}

.ambo {
    color: #00ffe0;
    font-size: 36px;
    font-weight: bold;
    margin-bottom: 12px;
}

.score {
    color: #ff7f7f;
    font-size: 18px;
    font-weight: bold;
}

/* RESPONSIVE */

@media(max-width: 1000px) {
    .top-grid,
    .grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media(max-width: 700px) {
    .top-grid,
    .grid {
        grid-template-columns: 1fr;
    }

    h1 {
        font-size: 40px;
    }

    .section-title {
        font-size: 30px;
    }
}
</style>
</head>
<body>

<div class="container">

    <h1>🔥 LOTTO ELITE PRO</h1>
    <h2>motore definitivo PRO</h2>

    <div id="app">
        Caricamento...
    </div>

</div>

<script>
fetch("risultati.json")
.then(response => response.json())
.then(data => {

    let html = "";

    /* TOP */

    html += `<div class="section-title">🎯 TOP</div>`;
    html += `<div class="top-grid">`;

    data.top.forEach(item => {
        html += `
            <div class="top-card">
                <h3>${item.ruota}</h3>
                <div class="top-number">
                    ${item.numeri[0]} — ${item.numeri[1]}
                </div>
            </div>
        `;
    });

    html += `</div>`;

    /* JOLLY */

    html += `<div class="section-title">💣 JOLLY</div>`;

    html += `
        <div class="jolly-card">
            <h3>${data.jolly.ruota}</h3>
            <div class="jolly-number">
                ${data.jolly.numeri[0]} — ${data.jolly.numeri[1]}
            </div>
        </div>
    `;

    /* RUOTE */

    html += `<div class="section-title">📊 RUOTE AMBO FORTE</div>`;
    html += `<div class="grid">`;

    data.ruote.forEach(item => {

        let ultima = item.ultima_estrazione
            ? item.ultima_estrazione.join(" • ")
            : "-";

        html += `
            <div class="card">
                <h3>${item.ruota}</h3>

                <div class="ultima-title">
                    Ultima Estrazione
                </div>

                <div class="ultima">
                    ${ultima}
                </div>

                <div class="ambo-title">
                    Ambo Forte
                </div>

                <div class="ambo">
                    ${item.numeri[0]} — ${item.numeri[1]}
                </div>

                <div class="score">
                    Score: ${item.score}
                </div>
            </div>
        `;
    });

    html += `</div>`;

    document.getElementById("app").innerHTML = html;
})
.catch(error => {
    document.getElementById("app").innerHTML =
        "<h2>Errore caricamento risultati.json</h2>";
    console.error(error);
});
</script>

</body>
</html>
