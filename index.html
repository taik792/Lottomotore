<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOTTO ELITE PRO</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #021629;
    color: white;
    font-family: Arial, sans-serif;
    padding: 20px;
    text-align: center;
}

h1 {
    color: #00ffd0;
    font-size: 42px;
    margin-bottom: 10px;
}

.subtitle {
    color: #00ffd0;
    font-size: 24px;
    margin-bottom: 35px;
    font-weight: bold;
}

h2 {
    margin: 35px 0 20px;
    font-size: 32px;
    color: white;
}

.grid-top {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.grid-ruote {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 22px;
}

.card-top {
    background: #2b2200;
    border: 3px solid #ffd700;
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 0 18px rgba(255,215,0,0.25);
}

.card-jolly {
    background: #5b0000;
    border: 3px solid red;
    border-radius: 22px;
    padding: 30px;
    max-width: 700px;
    margin: 0 auto 35px;
    box-shadow: 0 0 20px rgba(255,0,0,0.25);
}

.card-ruota {
    background: #08243b;
    border: 3px solid #00ffd0;
    border-radius: 20px;
    padding: 24px;
}

.ruota {
    font-size: 28px;
    font-weight: bold;
    color: #ffffff;
    margin-bottom: 14px;
}

.ultima-label {
    color: #cccccc;
    font-size: 18px;
    margin-bottom: 8px;
}

.ultima {
    color: white;
    font-size: 22px;
    line-height: 1.6;
    margin-bottom: 18px;
}

.ambo-label {
    color: #00ffd0;
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 8px;
}

.ambo {
    color: #00ffd0;
    font-size: 34px;
    font-weight: bold;
    margin-bottom: 14px;
}

.score {
    color: #ff6b6b;
    font-size: 20px;
    font-weight: bold;
}

@media(max-width: 768px) {
    h1 {
        font-size: 32px;
    }

    h2 {
        font-size: 26px;
    }

    .ruota {
        font-size: 24px;
    }

    .ambo {
        font-size: 28px;
    }

    .ultima {
        font-size: 18px;
    }
}
</style>
</head>
<body>

<h1>🔥 LOTTO ELITE PRO</h1>
<div class="subtitle">motore definitivo PRO</div>

<div id="contenuto">
    <h2>Caricamento risultati...</h2>
</div>

<script>
fetch("risultati.json")
.then(response => response.json())
.then(data => {

    let html = "";

    // TOP
    html += `<h2>🎯 TOP</h2>`;
    html += `<div class="grid-top">`;

    data.top.forEach(item => {
        html += `
            <div class="card-top">
                <div class="ruota">${item.ruota}</div>
                <div class="ambo">
                    ${item.numeri[0]} — ${item.numeri[1]}
                </div>
            </div>
        `;
    });

    html += `</div>`;

    // JOLLY
    html += `<h2>💣 JOLLY</h2>`;
    html += `
        <div class="card-jolly">
            <div class="ruota">
                ${data.jolly.ruota}
            </div>
            <div class="ambo">
                ${data.jolly.numeri[0]} — ${data.jolly.numeri[1]}
            </div>
        </div>
    `;

    // RUOTE
    html += `<h2>📊 RUOTE AMBO FORTE</h2>`;
    html += `<div class="grid-ruote">`;

    data.ruote.forEach(item => {

        let ultima = item.ultima_estrazione
            ? item.ultima_estrazione.join(" • ")
            : "Non disponibile";

        html += `
            <div class="card-ruota">

                <div class="ruota">
                    ${item.ruota}
                </div>

                <div class="ultima-label">
                    Ultima Estrazione
                </div>

                <div class="ultima">
                    ${ultima}
                </div>

                <div class="ambo-label">
                    Ambo Forte
                </div>

                <div class="ambo">
                    ${item.numeri[0]} — ${item.numeri[1]}
                </div>

                <div class="score">
                    Score: ${item.score}
                </div>

            </div>
        `;
    });

    html += `</div>`;

    document.getElementById("contenuto").innerHTML = html;
})
.catch(error => {
    console.error(error);

    document.getElementById("contenuto").innerHTML = `
        <h2>Errore caricamento risultati.json</h2>
    `;
});
</script>

</body>
</html>
