<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOTTO ELITE PRO</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #031f33;
    color: white;
    font-family: Arial, sans-serif;
    padding: 20px;
    text-align: center;
}

h1 {
    color: #00ffff;
    font-size: 42px;
    margin-bottom: 10px;
}

.subtitle {
    color: #00ffff;
    font-size: 18px;
    margin-bottom: 40px;
    font-weight: bold;
}

.section-title {
    font-size: 26px;
    margin: 35px 0 20px;
    font-weight: bold;
}

.grid-top {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    margin-bottom: 30px;
}

.grid-ambo {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    margin-top: 20px;
}

.card {
    border-radius: 22px;
    padding: 22px;
    box-shadow: 0 0 18px rgba(0,255,255,0.2);
}

.top-card {
    background: #3a2d00;
    border: 4px solid #ffd700;
}

.jolly-card {
    background: #8b0000;
    border: 4px solid red;
    margin-bottom: 30px;
}

.ambo-card {
    background: #0b2b47;
    border: 4px solid #00ffff;
}

.card h3 {
    font-size: 20px;
    margin-bottom: 14px;
}

.numbers {
    font-size: 26px;
    font-weight: bold;
    color: #00ffff;
    margin: 12px 0;
}

.score {
    color: #ff8c8c;
    font-weight: bold;
    margin-top: 12px;
}

p {
    margin: 8px 0;
    line-height: 1.5;
}

@media (max-width: 900px) {
    .grid-top,
    .grid-ambo {
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
    }

    .numbers {
        font-size: 18px;
    }

    .card h3 {
        font-size: 16px;
    }

    p {
        font-size: 14px;
    }
}

@media (max-width: 700px) {
    .grid-top,
    .grid-ambo {
        grid-template-columns: repeat(3, 1fr);
    }

    h1 {
        font-size: 28px;
    }

    .section-title {
        font-size: 20px;
    }
}
</style>
</head>
<body>

<h1>🔥 LOTTO ELITE PRO motore5</h1>
<div class="subtitle">motore definitivo PRO</div>

<div class="section-title">🎯 TOP</div>
<div id="top" class="grid-top"></div>

<div class="section-title">💣 JOLLY</div>
<div id="jolly"></div>

<div class="section-title">📊 RUOTE AMBO FORTE</div>
<div id="ambo-forte" class="grid-ambo"></div>

<script>
fetch("risultati.json")
.then(response => response.json())
.then(data => {

    // TOP
    const topContainer = document.getElementById("top");
    topContainer.innerHTML = "";

    data.top.forEach(item => {
        topContainer.innerHTML += `
            <div class="card top-card">
                <h3>${item.ruota}</h3>
                <div class="numbers">
                    ${item.numeri[0]} — ${item.numeri[1]}
                </div>
            </div>
        `;
    });

    // JOLLY
    const jollyContainer = document.getElementById("jolly");
    jollyContainer.innerHTML = `
        <div class="card jolly-card">
            <h3>${data.jolly.ruota}</h3>
            <div class="numbers">
                ${data.jolly.numeri[0]} — ${data.jolly.numeri[1]}
            </div>
        </div>
    `;

    // TUTTE LE RUOTE
    const amboContainer = document.getElementById("ambo-forte");
    amboContainer.innerHTML = "";

    data.ambo_forte.forEach(item => {
        amboContainer.innerHTML += `
            <div class="card ambo-card">
                <h3>${item.ruota}</h3>

                <p><strong>Ultima Estrazione</strong></p>
                <p>${item.ultima_estrazione.join(" • ")}</p>

                <p><strong>Ambo Forte</strong></p>
                <div class="numbers">
                    ${item.numeri[0]} — ${item.numeri[1]}
                </div>

                <p class="score">
                    Score: ${item.score}
                </p>
            </div>
        `;
    });

})
.catch(error => {
    console.error("Errore caricamento risultati:", error);
});
</script>

</body>
</html>
