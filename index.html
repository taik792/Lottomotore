<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOTTO ELITE PRO</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: #031b2f;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
}

.container {
    width: 95%;
    max-width: 1400px;
    margin: auto;
    padding: 20px 0 50px;
}

h1 {
    color: #00ffe0;
    font-size: 52px;
    margin-bottom: 10px;
    letter-spacing: 2px;
}

h2 {
    color: #00ffe0;
    font-size: 30px;
    margin-bottom: 40px;
}

.section-title {
    font-size: 42px;
    margin: 50px 0 25px;
    font-weight: bold;
}

/* TOP + JOLLY */

.top-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    margin-bottom: 30px;
}

.top-card {
    background: #2d2400;
    border: 3px solid #ffd700;
    border-radius: 24px;
    padding: 30px 20px;
    box-shadow: 0 0 20px rgba(255,215,0,0.25);
}

.top-card h3 {
    font-size: 30px;
    margin-bottom: 15px;
}

.top-card .num {
    color: #00ffe0;
    font-size: 44px;
    font-weight: bold;
}

.jolly-card {
    background: #5a0000;
    border: 3px solid red;
    border-radius: 24px;
    padding: 35px 20px;
    margin-bottom: 40px;
    box-shadow: 0 0 20px rgba(255,0,0,0.25);
}

.jolly-card h3 {
    font-size: 34px;
    margin-bottom: 15px;
}

.jolly-card .num {
    color: #00ffe0;
    font-size: 48px;
    font-weight: bold;
}

/* RUOTE */

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    margin-top: 20px;
    align-items: start;
}

.card {
    background: #08243d;
    border: 2px solid #00ffe0;
    border-radius: 22px;
    padding: 22px 18px;
    text-align: center;
    box-shadow: 0 0 12px rgba(0,255,224,0.18);
    min-height: 230px;
}

.card h3 {
    color: white;
    font-size: 28px;
    margin-bottom: 14px;
    font-weight: 700;
}

.card .ultima {
    color: #d8d8d8;
    font-size: 18px;
    margin-bottom: 14px;
    line-height: 1.6;
}

.card .label {
    color: white;
    font-size: 16px;
    margin-top: 10px;
    margin-bottom: 8px;
    font-weight: 600;
}

.card .ambo {
    color: #00ffe0;
    font-size: 34px;
    font-weight: 800;
    margin-bottom: 10px;
}

.card .score {
    color: #ff7b7b;
    font-size: 18px;
    font-weight: 700;
}

/* RESPONSIVE */

@media (max-width: 900px) {
    .top-grid {
        grid-template-columns: repeat(2, 1fr);
    }

    .grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 600px) {
    .top-grid,
    .grid {
        grid-template-columns: 1fr;
    }

    h1 {
        font-size: 38px;
    }

    h2 {
        font-size: 24px;
    }

    .section-title {
        font-size: 32px;
    }
}
</style>
</head>
<body>

<div class="container">

    <h1>🔥 LOTTO ELITE PRO</h1>
    <h2>motore definitivo PRO</h2>

    <div id="app">
        Caricamento...
    </div>

</div>

<script>
fetch("risultati.json")
.then(res => res.json())
.then(data => {
    let html = "";

    /* TOP */

    html += `<div class="section-title">🎯 TOP</div>`;
    html += `<div class="top-grid">`;

    data.top.forEach(item => {
        html += `
            <div class="top-card">
                <h3>${item.ruota}</h3>
                <div class="num">
                    ${item.numeri[0]} — ${item.numeri[1]}
                </div>
            </div>
        `;
    });

    html += `</div>`;

    /* JOLLY */

    html += `<div class="section-title">💣 JOLLY</div>`;

    html += `
        <div class="jolly-card">
            <h3>${data.jolly.ruota}</h3>
            <div class="num">
                ${data.jolly.numeri[0]} — ${data.jolly.numeri[1]}
            </div>
        </div>
    `;

    /* RUOTE */

    html += `<div class="section-title">📊 RUOTE AMBO FORTE</div>`;
    html += `<div class="grid">`;

    data.ruote.forEach(item => {
        let ultima = item.ultima_estrazione
            ? item.ultima_estrazione.join(" • ")
            : "-";

        html += `
            <div class="card">
                <h3>${item.ruota}</h3>

                <div class="ultima">
                    <strong>Ultima Estrazione</strong><br><br>
                    ${ultima}
                </div>

                <div class="label">Ambo Forte</div>

                <div class="ambo">
                    ${item.numeri[0]} — ${item.numeri[1]}
                </div>

                <div class="score">
                    Score: ${item.score}
                </div>
            </div>
        `;
    });

    html += `</div>`;

    document.getElementById("app").innerHTML = html;
})
.catch(err => {
    document.getElementById("app").innerHTML =
        "<h2>Errore caricamento risultati.json</h2>";
    console.error(err);
});
</script>

</body>
</html>
