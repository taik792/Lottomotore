<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔥 LOTTO ELITE PRO - Motore 5</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #021426;
      color: white;
      padding: 20px;
      text-align: center;
    }

    h1 {
      color: #00ffd5;
      font-size: 42px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .subtitle {
      color: #00ffd5;
      font-size: 22px;
      margin-bottom: 40px;
      font-weight: bold;
    }

    h2 {
      margin: 35px 0 20px;
      font-size: 34px;
      color: white;
    }

    .grid-top {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .grid-ruote {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .box-top {
      background: #2a2100;
      border: 3px solid #ffd700;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 0 18px rgba(255,215,0,0.25);
    }

    .box-jolly {
      background: #520000;
      border: 3px solid red;
      border-radius: 20px;
      padding: 28px;
      max-width: 750px;
      margin: 20px auto;
      box-shadow: 0 0 20px rgba(255,0,0,0.25);
    }

    .box-ruota {
      background: #08263d;
      border: 3px solid #00ffd5;
      border-radius: 18px;
      padding: 22px;
    }

    .ruota {
      font-size: 22px;
      color: #d5d5d5;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .numeri {
      font-size: 34px;
      font-weight: bold;
      color: #00ffd5;
      margin-bottom: 10px;
    }

    .score {
      font-size: 15px;
      color: #ff7070;
    }

    .loading {
      margin-top: 100px;
      font-size: 28px;
      color: #00ffd5;
    }

    @media(max-width: 768px) {
      h1 {
        font-size: 28px;
      }

      .subtitle {
        font-size: 18px;
      }

      h2 {
        font-size: 28px;
      }

      .numeri {
        font-size: 24px;
      }

      .ruota {
        font-size: 18px;
      }

      .grid-top,
      .grid-ruote {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>

  <h1>🔥 LOTTO ELITE PRO</h1>
  <div class="subtitle">motore 5 chirurgico</div>

  <div id="app">
    <div class="loading">
      Caricamento previsioni...
    </div>
  </div>

  <script>
    async function caricaPrevisioni() {
      try {
        /*
          ATTENZIONE:
          leggiamo risultati.json
          NON previsioni.json
        */
        const response = await fetch(
          "risultati.json?v=" + new Date().getTime()
        );

        const data = await response.json();

        let html = "";

        /* ======================
           TOP
        ====================== */

        html += `
          <h2>🎯 TOP</h2>
          <div class="grid-top">
        `;

        data.top.forEach(item => {
          html += `
            <div class="box-top">
              <div class="ruota">
                ${item.ruota}
              </div>

              <div class="numeri">
                ${item.numeri[0]} – ${item.numeri[1]}
              </div>
            </div>
          `;
        });

        html += `</div>`;

        /* ======================
           JOLLY
        ====================== */

        if (data.jolly) {
          html += `
            <h2>💣 JOLLY</h2>

            <div class="box-jolly">
              <div class="ruota">
                ${data.jolly.label}
              </div>

              <div class="numeri">
                ${data.jolly.numeri[0]} – ${data.jolly.numeri[1]}
              </div>
            </div>
          `;
        }

        /* ======================
           RUOTE COMPLETE
        ====================== */

        html += `
          <h2>📊 RUOTE ambo forte</h2>
          <div class="grid-ruote">
        `;

        Object.entries(data.ruote).forEach(([ruota, dati]) => {
          html += `
            <div class="box-ruota">
              <div class="ruota">
                ${ruota}
              </div>

              <div class="numeri">
                ${dati.numeri[0]} – ${dati.numeri[1]}
              </div>

              <div class="score">
                Score: ${dati.score}
              </div>
            </div>
          `;
        });

        html += `</div>`;

        document.getElementById("app").innerHTML = html;

      } catch (error) {
        console.error(error);

        document.getElementById("app").innerHTML = `
          <div class="loading">
            Errore caricamento risultati.json
          </div>
        `;
      }
    }

    caricaPrevisioni();
  </script>

</body>
</html>
